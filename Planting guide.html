<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dendrology</title>
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000000;
            color: #ccffcc;
            margin: 0;
            padding: 20px;
        }

        .main-container {
            max-width: 960px;
            margin: 0 auto;
            background-color: #0a110a;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 255, 0, 0.15);
        }

        .nav-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid #004d00;
        }

        .nav-logo {
            height: 50px;
            width: auto;
        }

        .nav-links {
            display: flex;
            gap: 10px;
        }

        h1 {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #00ff00;
        }

        h2, h3 {
            text-align: center;
            font-weight: normal;
            color: #32cd32;
            margin-top: 0;
            margin-bottom: 30px;
        }

        .text-container {
            border: 3px solid #00ff00;
            padding: 20px;
            border-radius: 10px;
            line-height: 1.6;
            background-color: #001a00;
            margin-bottom: 30px;
        }

        .image-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .image-container img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 255, 0, 0.1);
        }

        .tree-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .gallery-item {
            border: 1px solid #004d00;
            border-radius: 8px;
            overflow: hidden;
            background: #001a00;
            transition: transform 0.3s ease;
        }

        .gallery-item:hover {
            transform: scale(1.03);
            box-shadow: 0 5px 15px rgba(0, 255, 0, 0.2);
        }

        .gallery-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .gallery-caption {
            padding: 10px;
            text-align: center;
            font-weight: bold;
            color: #00ff00;
        }

        .button {
            display: inline-block;
            padding: 10px 20px;
            background-color: #00ff00;
            color: #000000;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            font-family: sans-serif;
            text-align: center;
            transition: background-color 0.3s ease, transform 0.1s ease;
            border: none;
        }

        .button:hover {
            background-color: #32cd32;
            color: #000000;
            transform: translateY(-2px);
        }

        .button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="nav-container">
        <img src="./Dendrology.com New logo3.png" alt="Dendrology Logo" class="nav-logo">
        <div class="nav-links">
            <a href="index.html" class="button">Home</a>
            <a href="about trees.html" class="button">About Trees</a>
            <a href="Planting guide.html" class="button">Planting Guide</a> 
        </div>
    </div>

    <h1>Planting Guide</h1>
    <h3>Welcome to the Official Dendrology.com Planting Guide!</h3>
    
</body>
</html>
