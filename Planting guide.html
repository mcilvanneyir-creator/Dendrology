<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dendrology</title>
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8fff8;
            color: #003300;
            margin: 0;
            padding: 20px;
        }

        .main-container {
            max-width: 960px;
            margin: 0 auto;
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .nav-container {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e0eee0;
        }

        h1 {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #004d00;
        }

        h2 {
            text-align: center;
            font-weight: normal;
            color: #006600;
            margin-top: 0;
            margin-bottom: 30px;
        }

        .text-container {
            border: 3px solid springgreen;
            padding: 20px;
            border-radius: 10px;
            line-height: 1.6;
            background-color: #fff;
            margin-bottom: 30px;
        }

        .image-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .image-container img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .tree-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .gallery-item {
            border: 1px solid #eee;
            border-radius: 8px;
            overflow: hidden;
            background: white;
            transition: transform 0.3s ease;
        }

        .gallery-item:hover {
            transform: scale(1.03);
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
        }

        .gallery-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .gallery-caption {
            padding: 10px;
            text-align: center;
            font-weight: bold;
            color: #004d00;
        }

        .button {
            display: inline-block;
            padding: 10px 20px;
            background-color: springgreen;
            color: #003300;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            font-family: sans-serif;
            text-align: center;
            margin: 5px 5px 5px 0;
            transition: background-color 0.3s ease, transform 0.1s ease;
            border: none;
        }

        .button:hover {
            background-color: mediumseagreen;
            color: white;
            transform: translateY(-2px);
        }

        .button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="nav-container">
        <a href="index.html" class="button">Home</a> | 
        <a href="about trees.html" class="button">About Trees</a> |
        <a href="Planting guide.html" class="button">Planting Guide</a> 
    </div>

    <h1>Planting Guide</h1>
    <h3>Welcome to the Official Dendrology.com Planting Guide!</h3>
